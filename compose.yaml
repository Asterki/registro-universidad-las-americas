services:
  redis:
    image: redis:7-alpine
    container_name: app-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports: # Just for development, remove in production
      - "6379:6379"

  mariadb:
    image: mariadb:latest
    container_name: app-mariadb
    restart: unless-stopped
    env_file:
      - ./.env.prod
    ports: # Just for development, remove in production
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-server
    depends_on:
      - redis
      - mariadb
    environment:
      - NODE_ENV=production
    volumes:
      - ./.env.prod:/app/.env.prod
    ports:
      - "3000:80"
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
          "cd .. && npx prisma generate && npx prisma db push && cd server && npm run start",
      ]

volumes:
  redis-data:
  mariadb-data:
